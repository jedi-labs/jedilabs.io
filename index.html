// ── Reveal on scroll ───────────────────────────────────────────────────────
function useReveal(ref, { threshold = 0.08 } = {}) {
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver(
      entries => entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } }),
      { threshold, rootMargin: '0px 0px -5% 0px' }
    );
    const observed = new WeakSet();
    const observeAll = () => {
      el.querySelectorAll('.reveal').forEach(n => {
        if (observed.has(n)) return;
        observed.add(n);
        const r = n.getBoundingClientRect();
        const vh = window.innerHeight || document.documentElement.clientHeight;
        if (r.top < vh && r.bottom > 0) n.classList.add('in');
        else io.observe(n);
      });
    };
    const raf1 = requestAnimationFrame(() => { observeAll(); requestAnimationFrame(observeAll); });
    const mo = new MutationObserver(observeAll);
    mo.observe(el, { childList: true, subtree: true });
    const timer = setTimeout(() => {
      el.querySelectorAll('.reveal').forEach(n => {
        const r = n.getBoundingClientRect();
        if (r.top < (window.innerHeight || document.documentElement.clientHeight) * 1.2) n.classList.add('in');
      });
    }, 1200);
    return () => { cancelAnimationFrame(raf1); clearTimeout(timer); mo.disconnect(); io.disconnect(); };
  }, [ref]);
}

        .og-service:hover { background: #ffffff06; transform: translateY(-3px); }

        .og-service .glyph {

          border: 1px solid #d4a25733;

        }
        .og-service .glyph svg { width: 30px; height: 30px; display: block; overflow: visible; }

        .og-service:hover .glyph { transform: translateY(-2px); border-color: #d4a25777; background: linear-gradient(180deg, #d4a25722, #d4a2570a); }

        .og-service .glyph .fade-in { opacity: .4; }
        .og-service .num { font-family: 'Geist Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: .14em; color: #ededed77; margin-bottom: 12px; }
        .og-service h3 {
          font-family: 'Fraunces', 'Newsreader', serif; font-weight: 420;
          font-variation-settings: 'opsz' 72, 'SOFT' 50;

        .og-service p { font-size: 15px; line-height: 1.6; color: #edededcc; margin: 0 0 20px; }

        .og-service ul li {
          padding: 10px 0; border-bottom: 1px dotted #ffffff18;

        /* Process */
        .og-process { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; margin-top: 48px; border-top: 1px solid #ffffff14; }
        @media (max-width: 980px) { .og-process { grid-template-columns: 1fr 1fr; } }
        .og-step {
          padding: 36px 24px; border-right: 1px solid #ffffff14; position: relative;
          transition: background .4s var(--ease);
        }
        .og-step:last-child { border-right: 0; }
        .og-step::before {
          content: ''; position: absolute; left: 50%; top: 0; width: 0; height: 2px;
          background: linear-gradient(90deg, transparent, #d4a257, transparent);
          transform: translateX(-50%); transition: width .7s var(--ease);

        .og-step:hover { background: #ffffff06; }
        .og-step:hover::before { width: 100%; }

          font-variation-settings: 'opsz' 144, 'SOFT' 100, 'WONK' 1;

        .og-step:hover .num { transform: scale(1.05) rotate(-3deg); }
        .og-step h4 { font-family: 'Newsreader', serif; font-weight: 500; font-size: 22px; line-height: 1.1; letter-spacing: -.01em; margin: 20px 0 10px; }

        .og-project:hover { border-color: #d4a25755; transform: translateY(-2px); }

        .og-project h3 {
          font-family: 'Fraunces', 'Newsreader', serif; font-weight: 380;

        .og-project h3 em {

        .og-project .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px; }
        .og-project .tags span { font-family: 'Geist Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: .1em; padding: 4px 10px; border: 1px solid #ffffff22; }
        .og-project .url a { font-family: 'Geist Mono', monospace; font-size: 12px; text-transform: uppercase; letter-spacing: .14em; color: #d4a257; text-decoration: none; padding-bottom: 2px; border-bottom: 1px solid #d4a25744; }
        .og-project .url a:hover { color: #fff; border-color: #fff; }
        .og-project .body p { font-family: 'Newsreader', serif; font-size: 19px; line-height: 1.55; color: #edededdd; margin: 0 0 28px; }
        .og-project .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; padding-top: 24px; border-top: 1px solid #ffffff14; }
        .og-project .stat .v {
          font-family: 'Fraunces', 'Newsreader', serif; font-weight: 420;
          font-variation-settings: 'opsz' 144, 'SOFT' 50;
          font-size: 54px; line-height: 1;
          background: linear-gradient(180deg, #f0b85f, #a87a33);
          -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .og-project .stat .l { font-family: 'Geist Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: .12em; color: #ededed88; margin-top: 6px; }

        /* Contact */
        .og-contact {
          max-width: 1400px; margin: 120px auto 0;
          padding: 120px 40px;
          border-top: 1px solid #ffffff14;
          display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center;
        }
        @media (max-width: 980px) { .og-contact { grid-template-columns: 1fr; padding: 60px 24px; } }

        }
        .og-contact h2 em {
          font-style: italic; font-variation-settings: 'opsz' 144, 'SOFT' 100, 'WONK' 1;
          background: linear-gradient(180deg, #f0b85f, #a87a33);
          -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .og-contact .side p { font-family: 'Newsreader', serif; font-size: 20px; line-height: 1.5; color: #edededdd; margin: 0 0 28px; max-width: 42ch; }
        .og-contact .mail {
          display: inline-block;
          font-family: 'Newsreader', serif; font-style: italic; font-size: 36px;
          color: #d4a257; text-decoration: none;
          border-bottom: 1px solid #d4a25755; padding-bottom: 3px;
        }
        .og-contact .mail:hover { color: #fff; border-color: #fff; }

        /* Footer */
        .og-footer {
          max-width: 1400px; margin: 0 auto; padding: 28px 40px;
          border-top: 1px solid #ffffff14;
          display: flex; justify-content: space-between; gap: 20px; flex-wrap: wrap;
          font-family: 'Geist Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: .14em; color: #ededed88;
        }

        /* Cursor spotlight */
        .og-spot {
          position: fixed; pointer-events: none; z-index: 1;
          width: 520px; height: 520px; border-radius: 50%;
          background: radial-gradient(circle, #d4a25712 0%, transparent 65%);
          transform: translate(-50%, -50%);
          mix-blend-mode: screen; filter: blur(20px);
        }
      `}</style>

        {meteors.map((m, i) => (
          <span key={'m'+i} className="og-meteor" style={{

          <li><a href="#services">Services</a></li>

      <section className="og-hero">

        <div className="trust">

          <div>
            <span className="label">— Est.</span>
            <div className="v"><em>2025</em></div>
          </div>
        </div>

      {/* Services */}
      <section className="og-section" id="services">

      <section className="og-section" id="projects">

                  {pr.stats.map((s, j) => (
                    <div key={j} className="stat">

      {/* Contact */}

      <footer className="og-footer">

}
